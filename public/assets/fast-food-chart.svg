<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" width="560" height="330" style="font-family: Arial, sans-serif; background: #fff;">
  <!-- Title -->
  <text x="230" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Consumption of Fast Food by Australian Teenagers</text>

  <!-- Y-axis label (rotated) -->
  <text transform="rotate(-90)" x="-170" y="13" text-anchor="middle" font-size="10" fill="#555">Number of times eaten per year</text>

  <!-- X-axis label -->
  <text x="230" y="322" text-anchor="middle" font-size="10" fill="#555">Year</text>

  <!-- Gridlines and Y-axis ticks: y(v) = 280 - v*(240/120) = 280 - 2v -->
  <!-- y(0)=280, y(20)=240, y(40)=200, y(60)=160, y(80)=120, y(100)=80, y(120)=40 -->
  <!-- X: x(1975)=70, x(1980)=134, x(1985)=198, x(1990)=262, x(1995)=326, x(2000)=390 -->

  <!-- Horizontal grid lines -->
  <line x1="70" y1="280" x2="390" y2="280" stroke="#ccc" stroke-width="0.8"/>
  <line x1="70" y1="240" x2="390" y2="240" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="70" y1="200" x2="390" y2="200" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="70" y1="160" x2="390" y2="160" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="70" y1="120" x2="390" y2="120" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="70" y1="80"  x2="390" y2="80"  stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="70" y1="40"  x2="390" y2="40"  stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Y-axis -->
  <line x1="70" y1="40" x2="70" y2="280" stroke="#888" stroke-width="1.2"/>
  <!-- X-axis -->
  <line x1="70" y1="280" x2="390" y2="280" stroke="#888" stroke-width="1.2"/>

  <!-- Y-axis labels -->
  <text x="62" y="284" text-anchor="end" font-size="10" fill="#555">0</text>
  <text x="62" y="244" text-anchor="end" font-size="10" fill="#555">20</text>
  <text x="62" y="204" text-anchor="end" font-size="10" fill="#555">40</text>
  <text x="62" y="164" text-anchor="end" font-size="10" fill="#555">60</text>
  <text x="62" y="124" text-anchor="end" font-size="10" fill="#555">80</text>
  <text x="62" y="84"  text-anchor="end" font-size="10" fill="#555">100</text>
  <text x="62" y="44"  text-anchor="end" font-size="10" fill="#555">120</text>

  <!-- X-axis labels -->
  <text x="70"  y="294" text-anchor="middle" font-size="10" fill="#555">1975</text>
  <text x="134" y="294" text-anchor="middle" font-size="10" fill="#555">1980</text>
  <text x="198" y="294" text-anchor="middle" font-size="10" fill="#555">1985</text>
  <text x="262" y="294" text-anchor="middle" font-size="10" fill="#555">1990</text>
  <text x="326" y="294" text-anchor="middle" font-size="10" fill="#555">1995</text>
  <text x="390" y="294" text-anchor="middle" font-size="10" fill="#555">2000</text>

  <!-- Pizza (blue): ~5, 15, 25, 35, 85, 85 -->
  <polyline
    points="70,270 134,250 198,230 262,210 326,110 390,110"
    fill="none" stroke="#4472c4" stroke-width="2.2"/>
  <circle cx="70"  cy="270" r="4" fill="#4472c4"/>
  <circle cx="134" cy="250" r="4" fill="#4472c4"/>
  <circle cx="198" cy="230" r="4" fill="#4472c4"/>
  <circle cx="262" cy="210" r="4" fill="#4472c4"/>
  <circle cx="326" cy="110" r="4" fill="#4472c4"/>
  <circle cx="390" cy="110" r="4" fill="#4472c4"/>

  <!-- Fish and Chips (red): ~100, 85, 95, 60, 30, 40 -->
  <polyline
    points="70,80 134,110 198,90 262,160 326,220 390,200"
    fill="none" stroke="#c0392b" stroke-width="2.2"/>
  <circle cx="70"  cy="80"  r="4" fill="#c0392b"/>
  <circle cx="134" cy="110" r="4" fill="#c0392b"/>
  <circle cx="198" cy="90"  r="4" fill="#c0392b"/>
  <circle cx="262" cy="160" r="4" fill="#c0392b"/>
  <circle cx="326" cy="220" r="4" fill="#c0392b"/>
  <circle cx="390" cy="200" r="4" fill="#c0392b"/>

  <!-- Hamburgers (green): ~15, 35, 85, 95, 100, 100 -->
  <polyline
    points="70,250 134,210 198,110 262,90 326,80 390,80"
    fill="none" stroke="#27ae60" stroke-width="2.2"/>
  <circle cx="70"  cy="250" r="4" fill="#27ae60"/>
  <circle cx="134" cy="210" r="4" fill="#27ae60"/>
  <circle cx="198" cy="110" r="4" fill="#27ae60"/>
  <circle cx="262" cy="90"  r="4" fill="#27ae60"/>
  <circle cx="326" cy="80"  r="4" fill="#27ae60"/>
  <circle cx="390" cy="80"  r="4" fill="#27ae60"/>

  <!-- Legend -->
  <rect x="410" y="95"  width="14" height="3" fill="#4472c4"/>
  <circle cx="417" cy="96.5" r="4" fill="#4472c4"/>
  <text x="428" y="100" font-size="11" fill="#333">Pizza</text>

  <rect x="410" y="115" width="14" height="3" fill="#c0392b"/>
  <circle cx="417" cy="116.5" r="4" fill="#c0392b"/>
  <text x="428" y="120" font-size="11" fill="#333">Fish and Chips</text>

  <rect x="410" y="135" width="14" height="3" fill="#27ae60"/>
  <circle cx="417" cy="136.5" r="4" fill="#27ae60"/>
  <text x="428" y="140" font-size="11" fill="#333">Hamburgers</text>
</svg>
